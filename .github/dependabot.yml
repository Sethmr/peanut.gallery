version: 2
updates:
  # npm — weekly, group lockstep updates so the PR queue stays sane
  - package-ecosystem: "npm"
    directory: "/"
    # Target develop, not main. The branch model in docs/RELEASE.md
    # routes everything (including dep bumps) through develop and into
    # main only via versioned release PRs. Without target-branch:
    # develop here, Dependabot would default to the repo's default
    # branch (main) and its PRs would either get auto-closed by
    # protect-main-branch.yml or sit there blocking on a Sethmr review
    # that won't come until release time.
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    groups:
      next-stack:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"
      lint-stack:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript"
      test-stack:
        patterns:
          - "tsx"
          - "ws"
          - "@types/ws"
      anthropic-stack:
        patterns:
          - "@anthropic-ai/*"
    # Major bumps on framework-tier deps go through an intentional migration
    # pass per docs/ROADMAP.md § Future framework + dependency upgrades, not
    # weekly auto-PRs. Minor + patch still flow through normally.
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@anthropic-ai/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"

  # github-actions — added 2026-04-19 alongside our first workflow
  # (pr-checklist-comment.yml). Weekly cadence keeps action versions current
  # without spamming the PR queue.
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 2
    # Major bumps on actions used inside protected workflow files want
    # deliberate review — minor + patch still flow through.
    ignore:
      - dependency-name: "actions/github-script"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
      - "area: ci"
