version: 2
updates:
  # npm — weekly, group lockstep updates so the PR queue stays sane
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    groups:
      next-stack:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"
      lint-stack:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript"
      test-stack:
        patterns:
          - "tsx"
          - "ws"
          - "@types/ws"
      anthropic-stack:
        patterns:
          - "@anthropic-ai/*"
    labels:
      - "dependencies"

  # github-actions — added 2026-04-19 alongside our first workflow
  # (pr-checklist-comment.yml). Weekly cadence keeps action versions current
  # without spamming the PR queue.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "area: ci"
