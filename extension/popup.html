<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f14;
      color: #e0e0e0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      color: white;
    }
    .header .emoji {
      font-size: 20px;
    }
    .status {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-size: 12px;
      line-height: 1.5;
    }
    .status.capturing {
      border-color: rgba(74, 222, 128, 0.3);
      background: rgba(74, 222, 128, 0.05);
    }
    .status .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
      margin-right: 6px;
      vertical-align: middle;
    }
    .status.capturing .dot {
      background: #4ade80;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 8px 10px;
      color: white;
      font-size: 13px;
      margin-bottom: 10px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: rgba(255,255,255,0.3);
    }
    input::placeholder { color: rgba(255,255,255,0.2); }
    .key-input {
      -webkit-text-security: disc;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-start {
      background: #3b82f6;
      color: white;
    }
    .btn-start:hover { background: #2563eb; }
    .btn-start:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .btn-stop {
      background: #ef4444;
      color: white;
    }
    .btn-stop:hover { background: #dc2626; }
    .hint {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      text-align: center;
      margin-top: 10px;
      line-height: 1.5;
    }
    .hint a {
      color: rgba(255,255,255,0.5);
      text-decoration: underline;
    }
    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 11px;
      color: #fca5a5;
      margin-bottom: 10px;
    }
    .section { margin-bottom: 12px; }
    .toggle-keys {
      background: none;
      border: none;
      width: auto;
      padding: 0;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      text-decoration: underline;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .toggle-keys:hover { color: rgba(255,255,255,0.7); }
    .keys-section { display: none; }
    .keys-section.visible { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <span class="emoji">🥜</span>
    <h1>Peanut Gallery</h1>
  </div>

  <div id="status" class="status">
    <span class="dot"></span>
    <span id="statusText">Not capturing</span>
  </div>

  <div id="errorBox" class="error" style="display:none"></div>

  <div class="section">
    <label>Server URL</label>
    <input type="text" id="serverUrl" placeholder="http://localhost:3000" value="http://localhost:3000" />
  </div>

  <button class="toggle-keys" id="toggleKeys">API Keys (optional — uses server .env if blank)</button>

  <div id="keysSection" class="keys-section">
    <div class="section">
      <label>Deepgram Key</label>
      <input type="text" id="deepgramKey" class="key-input" placeholder="Paste Deepgram key" />
    </div>
    <div class="section">
      <label>Groq Key</label>
      <input type="text" id="groqKey" class="key-input" placeholder="Paste Groq key" />
    </div>
  </div>

  <button id="startBtn" class="btn-start">Start Capturing This Tab</button>
  <button id="stopBtn" class="btn-stop" style="display:none">Stop Capturing</button>

  <div class="hint">
    Captures audio from the current tab silently.<br>
    No interference with video playback.
  </div>

  <script src="popup.js"></script>
</body>
</html>
