<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f14;
      --bg-secondary: #16161e;
      --bg-tertiary: #1e1e2a;
      --text: #e0e0e0;
      --text-muted: rgba(255,255,255,0.4);
      --text-dim: rgba(255,255,255,0.2);
      --border: rgba(255,255,255,0.06);
      --blue: #3b82f6;
      --red: #ef4444;
      --amber: #f59e0b;
      --purple: #a855f7;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
      flex-shrink: 0;
    }
    .header h1 { font-size: 14px; font-weight: 700; color: white; }
    .header .emoji { font-size: 16px; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }

    /* ── SETUP SECTION ── */
    .setup {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
      flex-shrink: 0;
    }
    .setup label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .setup input {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      color: white;
      font-size: 12px;
      margin-bottom: 8px;
      outline: none;
    }
    .setup input:focus { border-color: rgba(255,255,255,0.2); }
    .setup input::placeholder { color: var(--text-dim); }
    .key-input { -webkit-text-security: disc; }

    .toggle-keys {
      background: none;
      border: none;
      font-size: 10px;
      color: var(--text-muted);
      text-decoration: underline;
      cursor: pointer;
      padding: 0;
      margin-bottom: 6px;
    }
    .keys-section { display: none; }
    .keys-section.visible { display: block; }

    .btn-row { display: flex; gap: 6px; }
    .btn {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-start { background: var(--blue); color: white; }
    .btn-start:hover { background: #2563eb; }
    .btn-start:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-stop { background: var(--red); color: white; }
    .btn-stop:hover { background: #dc2626; }
    .btn-fire { background: rgba(245,158,11,0.15); color: var(--amber); }
    .btn-fire:hover { background: rgba(245,158,11,0.25); }

    /* ── STATUS BAR ── */
    .status-bar {
      padding: 6px 12px;
      font-size: 10px;
      font-family: monospace;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .status-bar .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #666;
      flex-shrink: 0;
    }
    .status-bar.live .dot { background: var(--red); animation: pulse 2s ease-in-out infinite; }
    .status-bar.active .dot { background: #4ade80; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    /* ── PERSONA AVATARS ROW ── */
    .personas-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .persona-bubble {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .persona-bubble:hover { transform: scale(1.1); }
    .persona-bubble:active { transform: scale(0.95); }
    .persona-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      position: relative;
    }
    .persona-avatar .ring {
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      border: 2px solid transparent;
      transition: border-color 0.3s;
    }
    .persona-avatar.speaking .ring { border-color: currentColor; animation: ring-pulse 1s ease-in-out infinite; }
    @keyframes ring-pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
    .persona-name { font-size: 9px; font-weight: 600; }
    .persona-role { font-size: 7px; color: var(--text-dim); }

    /* ── TRANSCRIPT ── */
    .transcript-section {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      max-height: 220px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .transcript-label {
      font-size: 9px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .transcript-text {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .transcript-text .interim { color: var(--text-dim); font-style: italic; }

    /* ── GALLERY FEED ── */
    .gallery {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .gallery::-webkit-scrollbar { width: 4px; }
    .gallery::-webkit-scrollbar-track { background: transparent; }
    .gallery::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .feed-entry {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      animation: fadeIn 0.3s ease-out;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .feed-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .feed-emoji { font-size: 12px; }
    .feed-name { font-size: 10px; font-weight: 600; }
    .feed-time { font-size: 8px; color: var(--text-dim); margin-left: auto; }

    .feed-text {
      font-size: 12px;
      line-height: 1.5;
      color: rgba(255,255,255,0.8);
    }

    .feed-streaming {
      border-color: rgba(255,255,255,0.1);
      background: var(--bg-tertiary);
    }
    .feed-streaming .feed-text::after {
      content: "▍";
      animation: blink 0.7s step-end infinite;
      color: var(--text-muted);
    }
    @keyframes blink { 50% { opacity:0; } }

    /* ── EMPTY STATE ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      color: var(--text-dim);
    }
    .empty-state .big-emoji { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 12px; line-height: 1.6; max-width: 240px; }

    /* ── ERROR ── */
    .error-banner {
      background: rgba(239,68,68,0.08);
      border-bottom: 1px solid rgba(239,68,68,0.15);
      padding: 6px 12px;
      font-size: 10px;
      color: #fca5a5;
      display: none;
      flex-shrink: 0;
    }
    .error-banner.visible { display: flex; align-items: center; gap: 6px; }
    .error-dismiss {
      margin-left: auto;
      background: none;
      border: none;
      color: #fca5a5;
      cursor: pointer;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <span class="emoji">🥜</span>
    <h1>Peanut Gallery</h1>
    <div class="header-right">
      <span id="versionBadge" style="font-size:8px; color:rgba(255,255,255,0.15); font-family:monospace;">v1.0</span>
    </div>
  </div>

  <!-- ERROR BANNER -->
  <div id="errorBanner" class="error-banner">
    <span id="errorText"></span>
    <button class="error-dismiss" id="errorDismiss">&times;</button>
  </div>

  <!-- SETUP (shown when not capturing) -->
  <div id="setupSection" class="setup">
    <label>Server URL</label>
    <input type="text" id="serverUrl" placeholder="http://localhost:3000" value="http://localhost:3000" />

    <button class="toggle-keys" id="toggleKeys">API Keys (optional)</button>
    <div id="keysSection" class="keys-section">
      <label>Deepgram</label>
      <input type="text" id="deepgramKey" class="key-input" placeholder="Deepgram API key" />
      <label>Groq</label>
      <input type="text" id="groqKey" class="key-input" placeholder="Groq API key" />
      <label>Anthropic (optional)</label>
      <input type="text" id="anthropicKey" class="key-input" placeholder="Anthropic API key" />
      <label>Brave Search (optional)</label>
      <input type="text" id="braveKey" class="key-input" placeholder="Brave Search API key" />
    </div>

    <div id="detectedTab" style="background:rgba(59,130,246,0.06); border:1px solid rgba(59,130,246,0.12); border-radius:6px; padding:6px 10px; margin-bottom:8px; display:none;">
      <div style="font-size:9px; color:rgba(255,255,255,0.3); margin-bottom:2px;">CAPTURING FROM</div>
      <div id="detectedTitle" style="font-size:11px; color:rgba(255,255,255,0.7); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></div>
    </div>

    <div class="btn-row">
      <button id="startBtn" class="btn btn-start">Start Listening</button>
    </div>
    <p style="font-size:9px; color:rgba(255,255,255,0.15); text-align:center; margin-top:6px;">
      Captures audio from the current tab. No interference with playback.
    </p>
  </div>

  <!-- STATUS BAR (shown when capturing) -->
  <div id="statusBar" class="status-bar" style="display:none;">
    <span class="dot"></span>
    <span id="statusText">Connecting...</span>
  </div>

  <!-- CONTROLS (shown when capturing) -->
  <div id="controlsRow" style="display:none; padding:6px 12px; border-bottom:1px solid var(--border); flex-shrink:0;">
    <div class="btn-row">
      <button id="fireBtn" class="btn btn-fire">🔥 React</button>
      <button id="stopBtn" class="btn btn-stop">Stop</button>
    </div>
  </div>

  <!-- PERSONA AVATARS (always visible) -->
  <div id="personasRow" class="personas-row"></div>

  <!-- TRANSCRIPT -->
  <div id="transcriptSection" class="transcript-section" style="display:none;">
    <div class="transcript-label">
      <span>📝</span>
      <span>Transcript</span>
    </div>
    <div id="transcriptText" class="transcript-text">Listening...</div>
  </div>

  <!-- GALLERY FEED -->
  <div id="gallery" class="gallery" style="display:none;"></div>

  <!-- EMPTY STATE -->
  <div id="emptyState" class="empty-state">
    <div class="big-emoji">🥜</div>
    <p>Open a YouTube video and click <strong>Start Listening</strong> to get real-time AI commentary from the Peanut Gallery.</p>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
